<h2>戦士 v3：右向き（側面）を追加</h2>
<p class="subtitle">右向きの3/4側面。前方(右)に片目、前手に剣、奥手(左)に盾の縁。下/上と並べて整合を確認してください。</p>

.panel.n{border-color:#3b5bdb;box-shadow:0 0 0 1px #3b5bdb55}

.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;margin-bottom:6px}
