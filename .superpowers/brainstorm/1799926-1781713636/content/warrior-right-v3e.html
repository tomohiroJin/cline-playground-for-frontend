<h2>戦士 v3：右向き（バランス調整）</h2>
<p class="subtitle">頭・胴・脚の縦軸を中央で揃え、剣を短めに、脚を胴の真下へ。傾きを抑えました。中央のグレー線は重心の目安です。</p>
