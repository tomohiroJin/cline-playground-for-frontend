function tick(now){
  for(const c of wc){const fd=OBJ.walk[c.k].frameDuration;const idx=CYC[Math.floor(now/fd)%4];const bob=Math.abs(Math.sin(now/fd*Math.PI))*2.2;paintBob(c.cv,wg[c.k][idx],S,bob);}
  for(const o of ac){const ctx=o.cv.getContext("2d");ctx.clearRect(0,0,o.cv.width,o.cv.height);const T=440;const t=(now%T)/T;let g,mv,sc;if(t<0.22){g=ag[o.k].w;mv=-1*(t/0.22);sc=1;}else if(t<0.5){const k=(t-0.22)/0.28;g=ag[o.k].s;mv=-1+9*k;sc=1+0.08*Math.sin(k*Math.PI);}else{const k=(t-0.5)/0.5;g=(k<0.5?ag[o.k].s:ag[o.k].i);mv=8*(1-k);sc=1;}const w=32*S*sc,h=32*S*sc;blit(ctx,g,(o.cv.width-w)/2+mv*S*0.5*o.dx,(o.cv.height-h)/2+mv*S*0.5*o.dy,S*sc);}
  requestAnimationFrame(tick);}
requestAnimationFrame(tick);
</script>
