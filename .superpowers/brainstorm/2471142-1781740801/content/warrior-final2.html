const OUTLINE=[12,12,22];
function alpha(p){return p.map(r=>r.map(v=>v!==0));}
function toRGB(p,pal){return p.map(r=>r.map(ci=>{if(ci===0)return null;const h=pal[ci]||"#f0f";return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}));}
function outline(p,pal){const h=p.length,w=p[0].length,a=alpha(p),px=toRGB(p,pal);const o=px.map(r=>r.slice());for(let y=0;y<h;y++)for(let x=0;x<w;x++){if(a[y][x])continue;const nb=(a[y-1]&&a[y-1][x])||(a[y+1]&&a[y+1][x])||a[y][x-1]||a[y][x+1];if(nb)o[y][x]=OUTLINE;}return o;}
function make(host,cap){const d=document.createElement("div");d.className="cell";const cv=document.createElement("canvas");d.appendChild(cv);const c=document.createElement("div");c.className="cap";c.textContent=cap;d.appendChild(c);document.getElementById(host).appendChild(d);return cv;}
function paint(cv,grid,scale,bob){const h=grid.length,w=grid[0].length,PAD=8;cv.width=w*scale;cv.height=(h+PAD)*scale;const ctx=cv.getContext("2d");ctx.imageSmoothingEnabled=false;ctx.clearRect(0,0,cv.width,cv.height);const cx=w*scale/2,feetY=(h+PAD-2)*scale,shrink=Math.min(0.4,bob*0.06);ctx.save();ctx.globalAlpha=0.32*(1-shrink);ctx.fillStyle="#000";ctx.beginPath();ctx.ellipse(cx,feetY,w*scale*0.3*(1-shrink),w*scale*0.096*(1-shrink),0,0,Math.PI*2);ctx.fill();ctx.restore();const off=document.createElement("canvas");off.width=w;off.height=h;const oc=off.getContext("2d");const img=oc.createImageData(w,h);for(let y=0;y<h;y++)for(let x=0;x<w;x++){const c=grid[y][x];const k=(y*w+x)*4;if(!c){img.data[k+3]=0;continue;}img.data[k]=c[0];img.data[k+1]=c[1];img.data[k+2]=c[2];img.data[k+3]=255;}oc.putImageData(img,0,0);ctx.drawImage(off,0,(PAD-bob)*scale,w*scale,h*scale);}
const dirs=[["down","下"],["up","上"],["left","左"],["right","右"]];
const wc=dirs.map(([k,jp])=>({k,cv:make("walk","歩行・"+jp)}));
const ac=[["down","攻撃・下"],["right","攻撃・右"]].map(([k,cap])=>({k,cv:make("atk",cap)}));
const wg={},ag={};for(const[k]of dirs){wg[k]=OBJ.walk[k].frames.map(f=>outline(f.pixels,f.palette));}for(const o of ac){ag[o.k]=OBJ.attack[o.k].frames.map(f=>outline(f.pixels,f.palette));}
const CYC=[1,2,3,2],S=6;
function tick(now){for(const c of wc){const fd=OBJ.walk[c.k].frameDuration;const idx=CYC[Math.floor(now/fd)%4];const bob=Math.abs(Math.sin(now/fd*Math.PI))*2.2;paint(c.cv,wg[c.k][idx],S,bob);}for(const o of ac){const fd=OBJ.attack[o.k].frameDuration;const i=Math.floor(now/fd)%ag[o.k].length;paint(o.cv,ag[o.k][i],S,0);}requestAnimationFrame(tick);}
